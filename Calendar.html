<!DOCTYPE html>
<html>
<head>
  <title>Calendario</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    .borde {
      width: 100%;
      border-collapse: collapse;
    }

    .borde th,
    .borde td {
      border: 1px solid black;
      padding: 1em;
    }

    th{
      width: 20%;
    }
  </style>
</head>

<body>
  <table class="borde">
    <tbody>
      <tr>
        <th>Lunes</th>
        <td>1</td>
      </tr>

      <tr>
        <th>Martes</th>
        <td>2</td>
      </tr>

      <tr>
        <th>Miércoles</th>
        <td>3</td>
      </tr>

      <tr>
        <th>Jueves</th>
        <td>4</td>
      </tr>

      <tr>
        <th>Viernes</th>
        <td>5</td>
      </tr>

      <tr>
        <th>Sábado</th>
        <td>6</td>
      </tr>

      <tr>
        <th>Domingo</th>
        <td>7</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
